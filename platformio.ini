
[platformio]
default_envs = waveshare_esp32s3_usb_msc

[env]
platform = espressif32@6.3.2
board = esp32-s3-r8-opi
framework = arduino
monitor_speed = 115200
upload_speed = 460800
extra_scripts = pre:tools/inject_build_tag.py
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DRSVP_ON_DEVICE_EPUB_CONVERSION=1
  -DBOARD_HAS_PSRAM
  ; Cap so a giant book like GEB doesn't OOM the device. 250k words covers most
  ; novels comfortably; longer books truncate with a warning rather than crash.
  -DRSVP_MAX_BOOK_WORDS=250000

[env:waveshare_esp32s3]
build_flags =
  ${env.build_flags}
  -DRSVP_USB_TRANSFER_ENABLED=0

[env:waveshare_esp32s3_usb_msc]
board_upload.wait_for_upload_port = true
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_USB_TRANSFER_ENABLED=1
build_unflags =
  -DARDUINO_USB_MODE=1
